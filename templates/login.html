<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Social Empires - Gateway</title>
    <link rel="shortcut icon" href="img/icon.gif"/>
    <link rel="icon" type="image/png" href="img/icon.gif"/>
    <style>
        body {
            font-family: 'Lucida Grande', Tahoma, Verdana, Arial, sans-serif;
            background: #669C2C url('img/Gamebar_byTrevo.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 3px solid #6e5335;
            width: 380px;
            text-align: center;
        }
        .logo-container img {
            width: 170px;
            margin-bottom: 10px;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            width: 50%;
            font-size: 12pt;
        }
        .tab.active {
            color: #6e5335;
            border-bottom: 3px solid #89bb0f;
        }
        .form-group {
            text-align: left;
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
            font-size: 10pt;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #9e7747;
            border-radius: 6px;
            font-size: 11pt;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #89bb0f;
            border: 2px solid #6e5335;
            border-radius: 6px;
            color: white;
            font-size: 13pt;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 3px 0 #5c7e0b;
        }
        .btn-submit:hover {
            background-color: #78a30d;
        }
        .hidden {
            display: none;
        }
        .error-box {
            background-color: #ffe6e6;
            color: #cc0000;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ffcccc;
            margin-bottom: 15px;
            font-size: 10pt;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="img/logo.png" alt="Social Empires Logo"/>
    </div>

    <div class="tabs">
        <div id="loginTab" class="tab active" onclick="switchTab('login')">Log In</div>
        <div id="signupTab" class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form id="loginForm" method="post" action="/login_process">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <div class="form-group">
            <label>Game Version</label>
            <select name="GAMEVERSION" required>
                <option value="SocialEmpires0926bsec.swf">0.9.26b (Working)</option>
                <option value="SocialEmpires1.1.5sec.swf">1.1.5 (Experimental)</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">Play Game</button>
    </form>

    <form id="signupForm" class="hidden" method="post" action="/signup_process">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Letters and numbers only" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create safe password" required>
        </div>
        <div class="form-group">
            <label>Empire Name</label>
            <input type="text" name="empire_name" placeholder="Name your kingdom" required>
        </div>
        <button type="submit" class="btn-submit" style="background-color: #0066cc; box-shadow: 0 3px 0 #004499; border-color: #003366;">Create Empire</button>
    </form>

    <div style="font-size: 9pt; color: #666; margin-top: 20px;">
        By Rayen  ~ {{ version | default("?")}}
    </div>
</div>

<script>
    function switchTab(type) {
        if(type === 'login') {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('signupTab').classList.remove('active');
        } else {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('signupTab').classList.add('active');
        }
    }
    
    // إذا فما خطأ، نبقوا في نفس الـ tab اللي كنا فيها
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('error') && urlParams.get('error').includes("taken")) {
        switchTab('signup');
    }
</script>

</body>
</html>
